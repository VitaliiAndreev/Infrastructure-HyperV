name: Release

on:
  push:
    branches:
      - master
    paths:
      # Only fire when the manifest itself changes, not on every push.
      - 'Infrastructure.HyperV/Infrastructure.HyperV.psd1'
  workflow_dispatch:

jobs:
  check-version:
    runs-on: windows-latest
    outputs:
      version_is_new: ${{ steps.check.outputs.version_is_new }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: check
        uses: VitaliiAndreev/Common-PowerShell/.github/actions/check-version-is-new@master
        with:
          psd1: 'Infrastructure.HyperV\Infrastructure.HyperV.psd1'

      # Gate the release on the manifest and changelog agreeing. A new
      # version that has not been promoted in CHANGELOG.md fails here,
      # before any tag or publish, so notes can never lag the release.
      - if: steps.check.outputs.version_is_new == 'true'
        uses: VitaliiAndreev/Common-PowerShell/.github/actions/assert-changelog-version@master
        with:
          psd1: 'Infrastructure.HyperV\Infrastructure.HyperV.psd1'
          changelog: CHANGELOG.md

  test-unit:
    needs: check-version
    if: needs.check-version.outputs.version_is_new == 'true'
    uses: VitaliiAndreev/Common-PowerShell/.github/workflows/ci-powershell.yml@master

  test-integration-host:
    needs: check-version
    if: needs.check-version.outputs.version_is_new == 'true'
    uses: VitaliiAndreev/Common-PowerShell/.github/workflows/ci-powershell-docker-host.yml@master

  test-integration-target:
    needs: check-version
    if: needs.check-version.outputs.version_is_new == 'true'
    uses: VitaliiAndreev/Common-PowerShell/.github/workflows/ci-powershell-docker-target.yml@master

  # Tag, publish to PSGallery, and cut the GitHub Release in one shared
  # back-end workflow - see release-tail.yml in Common-PowerShell.
  release-tail:
    needs: [ check-version, test-unit, test-integration-host, test-integration-target ]
    if: needs.check-version.outputs.version_is_new == 'true'
    permissions:
      contents: write
    uses: VitaliiAndreev/Common-PowerShell/.github/workflows/release-tail.yml@master
    with:
      psd1: 'Infrastructure.HyperV\Infrastructure.HyperV.psd1'
      module-path: Infrastructure.HyperV
      changelog: CHANGELOG.md
    secrets:
      PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
